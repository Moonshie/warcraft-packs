<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warcraft Packs</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/hover-tilt/dist/hover-tilt.js"></script>
    <script src="https://unpkg.com/dexie@latest/dist/dexie.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geologica:wght,CRSV@100..900,0&family=Reddit+Sans:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ── Header ──────────────────────────────────────────────── -->
    <div class="header">
        <div class="icon">
            <img id="left" src="./data/icon/menu.png" onclick="toggleMenu(id)">
        </div>
        <div class="icon">
            <img id="center" src="./data/icon/cog.png" onclick="toggleMenu(id)">
        </div>
        <div class="icon">
            <img id="right" src="./data/icon/info.png" onclick="toggleMenu(id)">
        </div>
    </div>

    <!-- ── Generate menu ───────────────────────────────────────── -->
    <div class="menu-wrapper" id="center">
        <div class="menu">
            <!-- Populated dynamically by ui.js from GameConfig -->
            <select id="set-select"  autocomplete="off"></select>
            <select id="type-select" autocomplete="off"></select>
            <!-- Extra selectors (class, faction, etc.) injected here -->
            <div id="extras-container"></div>
        </div>
        <div class="menu">
            <button id="generate" autocomplete="off">GENERATE</button>
        </div>
    </div>

    <!-- ── Left sidebar — bundle manager ───────────────────────── -->
    <div class="sidebar closed" id="left">

        <!-- Active bundle list -->
        <div class="bundle-list"></div>

        <!-- Recycle bin -->
        <div class="bundle-bin">
            <div class="bundle-bin-header">
                <span class="bundle-bin-icon">🗑</span>
                <span class="bundle-bin-label">Bin</span>
                <span class="bundle-bin-count"></span>
                <button class="bundle-btn bundle-btn--empty-bin" title="Empty bin">Empty</button>
            </div>
            <div class="bundle-bin-list"></div>
        </div>

        <!-- Bottom panel -->
        <div class="sidebar-panel">
            <button class="bundle-btn" id="import-btn"    title="Import bundle">↑ Import</button>
            <button class="bundle-btn" id="restore-btn"   title="Load backup">↺ Load backup</button>
            <button class="bundle-btn" id="backup-btn"    title="Backup all bundles">↓ Backup</button>
            <button class="bundle-btn" id="bin-all-btn"   title="Move all to bin">🗑 Bin all</button>
            <input id="import-input"  type="file" accept=".json" style="display:none">
            <input id="restore-input" type="file" accept=".json" style="display:none">
        </div>

    </div>

    <!-- ── Item track ───────────────────────────────────────────── -->
    <div class="track-wrapper">
        <div class="item-track"></div>
    </div>

    <!-- ── Right sidebar — info / future use ───────────────────── -->
    <div class="sidebar closed" id="right"></div>

    <!-- ── Fullscreen overlay — future use ─────────────────────── -->
    <div class="fullscreen closed" style="translate: 0px -100%"></div>

    <!-- ── Card preview tooltip ────────────────────────────────── -->
    <div id="preview-box">
        <div id="preview-loader"></div>
        <img id="preview-image" src="">
    </div>

    <!-- ── Item templates (cloned by renderItem, never visible) ── -->
    <div class="template">

        <!-- Booster pack -->
        <div class="pack-wrapper">
            <hover-tilt shadow scale-factor="1" glare-intensity="0.5">
                <div class="pack">
                    <div class="output hidden"></div>
                </div>
            </hover-tilt>
        </div>

        <!-- Big box / precon -->
        <div class="box-wrapper">
            <hover-tilt shadow scale-factor="1.05" tilt-factor="0.3" glare-intensity="0.3">
                <div class="box">
                    <div class="output hidden"></div>
                </div>
            </hover-tilt>
        </div>

        <!-- Singleton card (oversize hero, dragged-out card, etc.) -->
        <div class="card-wrapper">
            <hover-tilt shadow scale-factor="1.4" tilt-factor="1.4" glare-intensity="0.8">
                <div class="card"></div>
            </hover-tilt>
        </div>

    </div>

    <!-- ── Scripts ─────────────────────────────────────────────── -->

    <!-- Set databases -->
    <script src="data/set/Azeroth.js"></script>
    <script src="data/set/DarkPortal.js"></script>

    <!-- Game definitions + GameConfig -->
    <script src="scripts/wow-tcg-definitions.js"></script>

    <!-- Core modules -->
    <script src="scripts/generation.js"></script>
    <script src="scripts/storage.js"></script>
    <script src="scripts/animation.js"></script>
    <script src="scripts/render.js"></script>
    <script src="scripts/ui.js"></script>

</body>
</html>
